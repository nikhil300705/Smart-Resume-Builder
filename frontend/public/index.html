<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Smart Resume Builder - Create professional resumes with AI-powered suggestions and modern templates" />
    <meta name="keywords" content="resume builder, CV creator, job application, career, professional resume, AI resume" />
    <meta name="author" content="Smart Resume Builder" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartresumebuilder.com/" />
    <meta property="og:title" content="Smart Resume Builder - AI-Powered Professional Resumes" />
    <meta property="og:description" content="Create stunning professional resumes with AI-powered suggestions, modern templates, and easy-to-use interface." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://smartresumebuilder.com/" />
    <meta property="twitter:title" content="Smart Resume Builder - AI-Powered Professional Resumes" />
    <meta property="twitter:description" content="Create stunning professional resumes with AI-powered suggestions, modern templates, and easy-to-use interface." />
    <meta property="twitter:image" content="%PUBLIC_URL%/twitter-image.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    
    <!-- Favicon variations -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Critical CSS for loading state -->
    <style>
        /* Loading spinner styles */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 500;
            margin-top: 20px;
            text-align: center;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Hide loading when React loads */
        .loaded .loading-container {
            display: none;
        }
        
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            color: #333;
            background-color: #f8fafc;
        }
        
        code {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', source-code-pro, Menlo, Monaco, Consolas, 'Courier New', monospace;
        }
        
        /* Accessibility improvements */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        
        /* Focus styles for better accessibility */
        *:focus {
            outline: 2px solid #4f46e5;
            outline-offset: 2px;
        }
        
        /* Reduced motion for users who prefer it */
        @media (prefers-reduced-motion: reduce) {
            *,
            ::before,
            ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    
    <title>Smart Resume Builder - Create Professional Resumes with AI</title>
</head>
<body>
    <!-- Screen reader announcement -->
    <div class="sr-only" aria-live="polite" id="sr-announcements"></div>
    
    <!-- Loading screen -->
    <div class="loading-container" id="loading-screen">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text">
                Loading Smart Resume Builder...
            </div>
        </div>
    </div>
    
    <!-- Fallback message for users with JavaScript disabled -->
    <noscript>
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1f2937;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 20px;
            z-index: 10000;
        ">
            <div>
                <h1 style="font-size: 2rem; margin-bottom: 1rem; font-weight: 600;">
                    JavaScript Required
                </h1>
                <p style="font-size: 1.1rem; line-height: 1.6; max-width: 600px;">
                    Smart Resume Builder requires JavaScript to function properly. 
                    Please enable JavaScript in your browser settings and refresh the page.
                </p>
                <p style="margin-top: 1rem; opacity: 0.8;">
                    For the best experience, we recommend using a modern browser like 
                    Chrome, Firefox, Safari, or Edge.
                </p>
            </div>
        </div>
    </noscript>
    
    <!-- React root element -->
    <div id="root" role="main"></div>
    
    <!-- Service Worker Registration -->
    <script>
        // Remove loading screen when React app loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.body.classList.add('loaded');
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.display = 'none';
                }
            }, 100);
        });
        
        // Register service worker for PWA functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('SW registered: ', registration);
                    })
                    .catch(function(registrationError) {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
        
        // Error handling for uncaught errors
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
            
            // Announce error to screen readers
            const srAnnouncements = document.getElementById('sr-announcements');
            if (srAnnouncements) {
                srAnnouncements.textContent = 'An error occurred while loading the application. Please refresh the page.';
            }
        });
        
        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', function(e) {
            console.error('Unhandled promise rejection:', e.reason);
        });
        
        // Performance monitoring
        if ('performance' in window) {
            window.addEventListener('load', function() {
                setTimeout(function() {
                    const perfData = performance.getEntriesByType('navigation')[0];
                    if (perfData) {
                        console.log('Page Load Time:', perfData.loadEventEnd - perfData.loadEventStart, 'ms');
                        console.log('DOM Content Loaded:', perfData.domContentLoadedEventEnd - perfData.domContentLoadedEventStart, 'ms');
                    }
                }, 0);
            });
        }
    </script>
</body>
</html>
